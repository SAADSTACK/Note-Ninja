
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Ninja - Elite Transcription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- html2pdf.js for reliable PDF downloads -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
        
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-page: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.3s ease;
        }

        .mono { font-family: 'JetBrains+Mono', monospace; }

        /* Fancy Mesh Gradient Background - Light Mode Optimized */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-page);
            z-index: -1;
            overflow: hidden;
        }

        .mesh-blob {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.12;
            animation: float 25s infinite alternate ease-in-out;
        }

        .blob-1 { background: var(--primary); top: -20%; left: -10%; }
        .blob-2 { background: var(--secondary); bottom: -20%; right: -10%; animation-delay: -7s; }
        .blob-3 { background: #3b82f6; top: 30%; left: 20%; width: 500px; height: 500px; animation-delay: -12s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(120px, 80px) scale(1.1) rotate(15deg); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
        }

        .gradient-bg {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Interactive login card glow */
        .login-card {
            position: relative;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 60px -12px rgba(99, 102, 241, 0.15);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.08);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.15); }

        /* Fancy button ripple effect */
        .btn-fancy {
            position: relative;
            overflow: hidden;
        }
        .btn-fancy::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        /* Print Optimization */
        @media print {
            body { background-color: white !important; color: black !important; }
            header, button, .no-print, .fixed, .floating-action-button, .mesh-bg {
                display: none !important;
            }
            main { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .bg-white { box-shadow: none !important; border: none !important; padding: 0 !important; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom": "https://esm.sh/react-dom@^19.2.3",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body>
    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>
    <div id="root"></div>
    <!-- Entry point for the React application -->
    <script type="module" src="index.tsx"></script>
</body>
</html>
